<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model Example</title>
    <style>
        /* 1) Ordered List with Red Border, Padding, and Font Size */
        ol {
            border: 2px solid red;
            padding: 20px;
            font-size: 20px;
            list-style-position: inside;
        }

        /* 2) Flower Background Repeated */
        body {
            background: url('flower.jpg') repeat;
        }

        /* 3) Change Background Color of Text Box When Focused */
        input[type="text"] {
            padding: 5px;
            font-size: 16px;
        }

        input[type="text"]:focus {
            background-color: lightyellow;
        }

        /* 4) Fixed Link at the Bottom */
        .fixed-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: #333;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
        }

        .fixed-link:hover {
            background-color: #575757;
        }
    </style>
</head>
<body>

    <h2>1) Ordered List Example</h2>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>

    <h2>2) Text Box Focus Example</h2>
    <input type="text" placeholder="Focus on me">

    <!-- 4) Fixed Link -->
    <a href="#top" class="fixed-link">#Top</a>

</body>
</html>
