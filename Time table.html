<!DOCTYPE html>
<html>
<head>
<title>Class Timetable</title>
<style>
table {
  border: 1px solid black;
  border-collapse: collapse;
}
th, td {
  border: 1px solid black;
  padding: 8px;
}
</style>
</head>
<body>

<h2>Class Timetable</h2>

<table>
  <tr>
    <th colspan="2">Day</th>
    <th>Period 1</th>
    <th>Period 2</th>
    <th>Period 3</th>
    <th>Period 4</th>
    <th>Period 5</th>
  </tr>
  <tr>
    <td rowspan="2">Monday</td>
    <td>9:00 - 10:00</td>
    <td>Math</td>
    <td>Science</td>
    <td>English</td>
    <td colspan="2" rowspan="2">Lunch</td>
  </tr>
  <tr>
    <td>10:00 - 11:00</td>
    <td>Social Studies</td>
    <td>Hindi</td>
    <td>Computer</td>
  </tr>
  <tr>
    <td rowspan="2">Tuesday</td>
    <td>9:00 - 10:00</td>
    <td>Science</td>
    <td>Math</td>
    <td>English</td>
    <td colspan="2" rowspan="1">Lunch</td>
  </tr>
  <tr>
    <td>10:00 - 11:00</td>
    <td>Hindi</td>
    <td>Social Studies</td>
    <td>Computer</td>
  </tr>
  </table>

</body>
</html>
