<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Form</title>
</head>
<body>

<h2>User Registration Form</h2>
<form action="#" method="post" enctype="multipart/form-data">
    <!-- Name -->
    <div class="form-group">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
    </div>
    <br>
    <!-- Date of Birth -->
    <div class="form-group">
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>
        <br>
    </div>
    <br>

    <!-- Gender -->
    <div class="form-group">
        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label>
    </div>
    <br>
    <!-- Email -->
    <div class="form-group">
        <label for="email">Email ID:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
    </div>
    <br>

    <!-- Mobile Number -->
    <div class="form-group">
        <label for="mobile">Mobile No.:</label>
        <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" required>
    </div>
    <br>

    <!-- Address -->
    <div class="form-group">
        <label for="address">Address:</label>
        <textarea id="address" name="address" placeholder="Enter your address" rows="4" required></textarea>
    </div>
    <br>

    <!-- State -->
    <div class="form-group">
        <label for="state">State:</label>
        <select id="state" name="state" required>
            <option value="">-- Select Your State --</option>
            <option value="Gujarat">Gujarat</option>
            <option value="Maharastra">Maharastra</option>
            <option value="Bihar">Bihar</option>
            <option value="Rajasthan">Rajasthan</option>
            <option value="Other">Other</option>
            <br>
        </select>
    </div>
    <br>

    <!-- Education -->
    <div class="form-group">
        <label>Education:</label><br>
        <input type="checkbox" id="highschool" name="education" value="High School">
        <label for="highschool">High School</label>
        <input type="checkbox" id="bachelor" name="education" value="Bachelor's">
        <label for="bachelor">Bachelor's</label>
        <input type="checkbox" id="master" name="education" value="Master's">
        <label for="master">Master's</label>
        <input type="checkbox" id="phd" name="education" value="PhD">
        <label for="phd">PhD</label>
    </div>
    <br>

    <!-- Image Upload -->
    <div class="form-group">
        <label for="image">Upload Profile Image:</label>
        <input type="file" id="image" name="image" accept="image/*" required>
    </div>
    <br>

    <!-- Submit Button -->
    <div class="form-group">
        <button type="submit">Register</button>
    </div>
    <br><Data>
    </Data>
</form>

</body>
</html>
